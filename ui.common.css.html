<style>
:root {
  --bg-main: #020617;
  --bg-panel: #0f172a;
  --bg-panel-soft: rgba(15, 23, 42, 0.82);
  --text-main: #e5e7eb;
  --text-soft: #94a3b8;
  --accent-blue: #60a5fa;
  --state-free: #34d399;
  --state-occupied: #fb7185;
  --state-next: #fbbf24;
  --border: #1e293b;
  --shadow: 0 30px 80px rgba(2, 6, 23, 0.45);
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
}

body {
  background:
    radial-gradient(circle at top left, rgba(96, 165, 250, 0.18), transparent 26%),
    radial-gradient(circle at top right, rgba(251, 191, 36, 0.14), transparent 24%),
    linear-gradient(180deg, #07101f 0%, var(--bg-main) 100%);
  color: var(--text-main);
  font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
}

a {
  color: inherit;
}

.page-shell {
  min-height: 100vh;
  padding: 24px;
}

.app-header {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-start;
  margin-bottom: 24px;
}

.title-block h1,
.title-block h2,
.title-block h3,
.title-block p {
  margin: 0;
}

.eyebrow {
  color: var(--accent-blue);
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-size: 12px;
  margin-bottom: 6px;
}

.title-block h1 {
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 700;
}

.subtitle {
  color: var(--text-soft);
  margin-top: 6px;
}

.status-pill,
.legend-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: rgba(15, 23, 42, 0.7);
  color: var(--text-soft);
  font-size: 13px;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
}

.dot.free {
  background: var(--state-free);
}

.dot.occupied {
  background: var(--state-occupied);
}

.dot.next {
  background: var(--state-next);
}

.panel {
  background: var(--bg-panel-soft);
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
}

.grid {
  display: grid;
  gap: 18px;
}

.grid-2 {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.grid-3 {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}

.input,
.select,
.textarea,
.button {
  border-radius: 14px;
  border: 1px solid var(--border);
  font: inherit;
}

.input,
.select,
.textarea {
  width: 100%;
  padding: 12px 14px;
  color: var(--text-main);
  background: rgba(2, 6, 23, 0.72);
}

.textarea {
  min-height: 110px;
  resize: vertical;
}

.button {
  padding: 12px 16px;
  background: linear-gradient(135deg, rgba(96, 165, 250, 0.24), rgba(96, 165, 250, 0.08));
  color: var(--text-main);
  cursor: pointer;
}

.button.secondary {
  background: rgba(15, 23, 42, 0.8);
}

.button.warn {
  background: rgba(251, 113, 133, 0.12);
}

.button:disabled {
  opacity: 0.5;
  cursor: wait;
}

.notice {
  margin: 12px 0 0;
  padding: 12px 14px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: rgba(15, 23, 42, 0.74);
  color: var(--text-soft);
}

.notice.error {
  border-color: rgba(251, 113, 133, 0.4);
  color: #fecdd3;
}

.notice.success {
  border-color: rgba(52, 211, 153, 0.4);
  color: #bbf7d0;
}

.metric-card,
.table-card,
.form-card {
  padding: 20px;
}

.metric-card h3,
.table-card h3,
.form-card h3 {
  margin: 0 0 12px;
}

.metric-value {
  font-size: 34px;
  font-weight: 700;
}

.muted {
  color: var(--text-soft);
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 720px;
}

th,
td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(148, 163, 184, 0.16);
  text-align: left;
  vertical-align: top;
}

th {
  color: var(--accent-blue);
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.compact-table td {
  padding: 8px 10px;
}

body.board-monitor {
  overflow: hidden;
}

body.board-monitor .page-shell {
  min-height: 100vh;
  height: 100vh;
  padding: 10px 14px;
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 8px;
}

body.board-monitor .app-header {
  margin-bottom: 0;
  gap: 8px;
  align-items: flex-start;
}

body.board-monitor .eyebrow {
  font-size: 10px;
  margin-bottom: 2px;
}

body.board-monitor .title-block h1 {
  font-size: clamp(20px, 1.7vw, 26px);
  line-height: 1.05;
}

body.board-monitor .subtitle {
  margin-top: 2px;
  font-size: 12px;
}

body.board-monitor .status-pill,
body.board-monitor .legend-pill {
  padding: 5px 8px;
  font-size: 11px;
}

body.board-monitor .board-stage {
  padding: 6px;
  min-height: 0;
  height: 100%;
  overflow: hidden;
}

body.board-monitor #board-root {
  height: 100%;
}

.board-fit-shell {
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.board-canvas {
  width: 1780px;
  height: 700px;
  transform-origin: top center;
  display: block;
}

.board-tree {
  display: grid;
  grid-template-columns: 360px 76px minmax(0, 1fr) 350px;
  gap: 12px;
  align-items: start;
}

.tree-left-column,
.tree-right-column,
.tree-lab-column {
  display: grid;
  gap: 10px;
  align-content: start;
}

.tree-left-column {
  padding-top: 8px;
}

.tree-left-column .branch-pa1 {
  margin-top: 34px;
}

.tree-center-column {
  position: relative;
  height: 470px;
}

.tree-spine {
  position: absolute;
  left: 50%;
  top: 86px;
  height: 305px;
  width: 4px;
  transform: translateX(-50%);
  border-radius: 999px;
  background: linear-gradient(180deg, rgba(96, 165, 250, 0.65), rgba(148, 163, 184, 0.2));
}

.spine-node {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  padding: 4px 7px;
  border-radius: 999px;
  border: 1px solid rgba(96, 165, 250, 0.45);
  background: rgba(2, 6, 23, 0.95);
  color: var(--accent-blue);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
}

.spine-node.node-2p {
  top: 62px;
}

.spine-node.node-1p {
  top: 214px;
}

.spine-node.node-pt {
  top: 366px;
}

.tree-right-column {
  padding-top: 8px;
}

.floor-group {
  position: relative;
  display: grid;
  gap: 6px;
}

.floor-group.floor-group-1p {
  margin-top: 16px;
}

.floor-group::before {
  content: "";
  position: absolute;
  left: -13px;
  top: 23px;
  width: 13px;
  border-top: 2px solid rgba(96, 165, 250, 0.35);
}

.floor-group-label {
  color: var(--accent-blue);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.floor-group-branches {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 6px;
}

.branch-panel {
  position: relative;
  display: grid;
  gap: 6px;
  border: 1px solid var(--border);
  border-radius: 9px;
  background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.82));
  padding: 7px;
}

.branch-panel.left::before,
.branch-panel.right::before,
.branch-panel.pt::before {
  content: "";
  position: absolute;
  top: 22px;
  width: 12px;
  border-top: 2px solid rgba(96, 165, 250, 0.35);
}

.branch-panel.left::before {
  right: -12px;
}

.branch-panel.right::before,
.branch-panel.pt::before {
  left: -12px;
}

.branch-panel.branch-pt {
  margin-top: 12px;
}

.branch-panel.lab::before {
  content: none;
}

.branch-label {
  color: var(--accent-blue);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.branch-tiles {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 6px;
}

.branch-empty {
  padding: 6px;
  border-radius: 8px;
  border: 1px dashed rgba(148, 163, 184, 0.26);
  color: var(--text-soft);
  font-size: 10px;
}

.tree-lab-column .branch-panel {
  height: 100%;
}

.tree-lab-column .branch-tiles {
  grid-template-columns: repeat(2, minmax(150px, 1fr));
  gap: 6px;
}

.room-tile {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 64px;
  padding: 7px 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(2, 6, 23, 0.9), rgba(15, 23, 42, 0.78));
  text-decoration: none;
  box-shadow: 0 4px 10px rgba(2, 6, 23, 0.22);
}

.room-tile.free {
  border-color: rgba(52, 211, 153, 0.54);
  background: linear-gradient(180deg, rgba(6, 31, 28, 0.78), rgba(15, 23, 42, 0.82));
}

.room-tile.occupied {
  border-color: rgba(251, 113, 133, 0.58);
  background: linear-gradient(180deg, rgba(55, 20, 29, 0.78), rgba(15, 23, 42, 0.82));
}

.room-tile.next-occupied {
  border-color: rgba(251, 191, 36, 0.56);
  background: linear-gradient(180deg, rgba(51, 36, 15, 0.78), rgba(15, 23, 42, 0.82));
}

.room-title {
  font-size: clamp(12px, 0.9vw, 14px);
  font-weight: 700;
  letter-spacing: 0.01em;
  text-transform: uppercase;
  line-height: 1.05;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.room-lines {
  display: grid;
  gap: 1px;
  font-size: clamp(10px, 0.73vw, 11px);
  font-weight: 600;
  letter-spacing: 0.01em;
  line-height: 1.08;
}

.room-lines div {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.stack {
  display: grid;
  gap: 14px;
}

.section-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.editable-cell input {
  width: 100%;
  min-width: 120px;
  padding: 9px 10px;
  border-radius: 10px;
  border: 1px solid rgba(148, 163, 184, 0.2);
  background: rgba(2, 6, 23, 0.7);
  color: var(--text-main);
  font: inherit;
}

.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

@media (max-width: 960px) {
  .grid-2,
  .grid-3 {
    grid-template-columns: 1fr;
  }

  body.board-monitor .page-shell {
    height: auto;
    min-height: 100vh;
    overflow: auto;
  }

  .board-canvas {
    width: 100%;
    height: auto;
    transform: none !important;
  }

  .board-tree {
    grid-template-columns: 1fr;
  }

  .tree-center-column {
    display: none;
  }

  .floor-group-branches,
  .tree-lab-column .branch-tiles {
    grid-template-columns: 1fr;
  }

  .floor-group::before,
  .branch-panel.left::before,
  .branch-panel.right::before,
  .branch-panel.pt::before {
    content: none;
  }

  .page-shell {
    padding: 16px;
  }

  .app-header {
    flex-direction: column;
  }
}
</style>
