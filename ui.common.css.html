<style>
:root {
  --bg-main: #020617;
  --bg-panel: #0f172a;
  --bg-panel-soft: rgba(15, 23, 42, 0.82);
  --text-main: #e5e7eb;
  --text-soft: #94a3b8;
  --accent-blue: #60a5fa;
  --state-free: #34d399;
  --state-occupied: #fb7185;
  --state-next: #fbbf24;
  --border: #1e293b;
  --shadow: 0 30px 80px rgba(2, 6, 23, 0.45);
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
}

body {
  background:
    radial-gradient(circle at top left, rgba(96, 165, 250, 0.18), transparent 26%),
    radial-gradient(circle at top right, rgba(251, 191, 36, 0.14), transparent 24%),
    linear-gradient(180deg, #07101f 0%, var(--bg-main) 100%);
  color: var(--text-main);
  font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
}

a {
  color: inherit;
}

.page-shell {
  min-height: 100vh;
  padding: 24px;
}

.app-header {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-start;
  margin-bottom: 24px;
}

.title-block h1,
.title-block h2,
.title-block h3,
.title-block p {
  margin: 0;
}

.eyebrow {
  color: var(--accent-blue);
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-size: 12px;
  margin-bottom: 6px;
}

.title-block h1 {
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 700;
}

.subtitle {
  color: var(--text-soft);
  margin-top: 6px;
}

.status-pill,
.legend-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: rgba(15, 23, 42, 0.7);
  color: var(--text-soft);
  font-size: 13px;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
}

.dot.free {
  background: var(--state-free);
}

.dot.occupied {
  background: var(--state-occupied);
}

.dot.next {
  background: var(--state-next);
}

.panel {
  background: var(--bg-panel-soft);
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
}

.grid {
  display: grid;
  gap: 18px;
}

.grid-2 {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.grid-3 {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}

.input,
.select,
.textarea,
.button {
  border-radius: 14px;
  border: 1px solid var(--border);
  font: inherit;
}

.input,
.select,
.textarea {
  width: 100%;
  padding: 12px 14px;
  color: var(--text-main);
  background: rgba(2, 6, 23, 0.72);
}

.textarea {
  min-height: 110px;
  resize: vertical;
}

.button {
  padding: 12px 16px;
  background: linear-gradient(135deg, rgba(96, 165, 250, 0.24), rgba(96, 165, 250, 0.08));
  color: var(--text-main);
  cursor: pointer;
}

.button.secondary {
  background: rgba(15, 23, 42, 0.8);
}

.button.warn {
  background: rgba(251, 113, 133, 0.12);
}

.button:disabled {
  opacity: 0.5;
  cursor: wait;
}

.notice {
  margin: 12px 0 0;
  padding: 12px 14px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: rgba(15, 23, 42, 0.74);
  color: var(--text-soft);
}

.notice.error {
  border-color: rgba(251, 113, 133, 0.4);
  color: #fecdd3;
}

.notice.success {
  border-color: rgba(52, 211, 153, 0.4);
  color: #bbf7d0;
}

.metric-card,
.table-card,
.form-card {
  padding: 20px;
}

.metric-card h3,
.table-card h3,
.form-card h3 {
  margin: 0 0 12px;
}

.metric-value {
  font-size: 34px;
  font-weight: 700;
}

.muted {
  color: var(--text-soft);
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 720px;
}

th,
td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(148, 163, 184, 0.16);
  text-align: left;
  vertical-align: top;
}

th {
  color: var(--accent-blue);
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.compact-table td {
  padding: 8px 10px;
}

.board-stage {
  padding: 24px;
  min-height: calc(100vh - 170px);
}

.board-page {
  display: grid;
  grid-template-columns: repeat(16, minmax(0, 1fr));
  grid-auto-rows: 92px;
  gap: 18px 14px;
  position: relative;
}

.board-line {
  grid-column: 1 / -1;
  align-self: end;
  height: 5px;
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(96, 165, 250, 0.32), rgba(148, 163, 184, 0.22));
  box-shadow: 0 0 40px rgba(96, 165, 250, 0.15);
}

.board-row-label {
  position: absolute;
  left: 0;
  transform: translateY(-24px);
  color: var(--text-soft);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.room-tile {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 82px;
  padding: 10px 12px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.84));
  text-decoration: none;
  box-shadow: 0 16px 26px rgba(2, 6, 23, 0.28);
  transform: translateY(-12px);
}

.room-tile.free {
  border-color: rgba(52, 211, 153, 0.34);
}

.room-tile.occupied {
  border-color: rgba(251, 113, 133, 0.4);
}

.room-tile.next-occupied {
  border-color: rgba(251, 191, 36, 0.38);
}

.room-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.room-meta {
  font-size: 11px;
  color: var(--text-soft);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.room-lines {
  display: grid;
  gap: 4px;
  font-size: 12px;
}

.room-lines strong {
  color: var(--text-main);
}

.stack {
  display: grid;
  gap: 14px;
}

.section-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.editable-cell input {
  width: 100%;
  min-width: 120px;
  padding: 9px 10px;
  border-radius: 10px;
  border: 1px solid rgba(148, 163, 184, 0.2);
  background: rgba(2, 6, 23, 0.7);
  color: var(--text-main);
  font: inherit;
}

.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

@media (max-width: 960px) {
  .grid-2,
  .grid-3 {
    grid-template-columns: 1fr;
  }

  .board-page {
    grid-template-columns: repeat(8, minmax(0, 1fr));
    grid-auto-rows: 104px;
  }

  .page-shell {
    padding: 16px;
  }

  .app-header {
    flex-direction: column;
  }
}
</style>
