<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <?!= include_('ui.common.css.html'); ?>
    <style>
      .substitution-page {
        max-width: 1480px;
        margin: 0 auto;
        padding: 24px 18px 32px;
      }
      .substitution-page-header {
        margin-bottom: 18px;
      }
      .substitution-page-header h1 {
        margin: 4px 0 6px;
      }
      .substitution-tab-strip {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .substitution-tab-content {
        display: none;
      }
      .substitution-tab-content.active {
        display: block;
      }
      .substitution-embedded-card {
        padding: 0;
        overflow: hidden;
      }
      .substitution-workbench-shell .replacement-tabs {
        display: none;
      }
      .substitution-workbench-shell #replacement-close-button,
      .substitution-workbench-shell #replacement-close-button-bottom,
      .substitution-workbench-shell #replacement-close-button-trips-bottom,
      .substitution-workbench-shell #replacement-close-button-long-bottom {
        display: none !important;
      }
      .substitution-tab-content .replacement-modal {
        display: flex !important;
      }
      .substitution-tab-content .replacement-dialog {
        min-height: 0;
      }
      .substitution-placeholder {
        padding: 28px;
      }
      .substitution-placeholder h3 {
        margin-top: 0;
      }
      .substitution-placeholder p {
        margin-bottom: 0;
        color: var(--muted);
      }
      .substitution-user-pill {
        margin-left: auto;
      }
      .substitution-workbench-error {
        margin-top: 12px;
      }
      @media (max-width: 720px) {
        .substitution-page {
          padding-left: 12px;
          padding-right: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <div class="substitution-page">
        <header class="app-header substitution-page-header">
          <div class="title-block">
            <div class="eyebrow">Modulo unificato</div>
            <h1>Sostituzioni</h1>
            <p class="subtitle" id="substitution-subtitle"></p>
          </div>
          <div class="status-pill substitution-user-pill" id="substitution-user-pill"></div>
        </header>

        <div class="substitution-tab-strip" id="substitution-tab-strip">
          <button class="button secondary substitution-tab-button active" type="button" data-tab="daily" data-panel="workbench">Sostituzioni giornaliere</button>
          <button class="button secondary substitution-tab-button" type="button" data-tab="absences">Inserimento assenze</button>
          <button class="button secondary substitution-tab-button" type="button" data-tab="trips" data-panel="workbench">Uscite didattiche</button>
          <button class="button secondary substitution-tab-button" type="button" data-tab="long" data-panel="workbench">Supplenze lunghe</button>
          <button class="button secondary substitution-tab-button" type="button" data-tab="reports">Report giornalieri</button>
        </div>

        <div id="substitution-root">
          <section class="substitution-tab-content active substitution-workbench-shell" data-tab-panel="workbench">
            <?!= dailyContentHtml ?>
          </section>

          <section class="panel substitution-placeholder substitution-tab-content" data-tab-panel="absences">
            <h3>Sezione in costruzione</h3>
            <p>Inserimento assenze sarà integrato in un passaggio successivo.</p>
          </section>

          <section class="panel substitution-embedded-card substitution-tab-content" data-tab-panel="reports">
            <div id="substitution-reports-root">
              <?!= reportsHtml ?>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script>
      window.ROOMS_SUBSTITUTION_SHELL_MODEL = <?!= initialModelJson ?>;
    </script>
    <?!= dailyScriptsHtml ?>
    <script>
      (function () {
        var model = window.ROOMS_SUBSTITUTION_SHELL_MODEL || {};
        var reportsRoot = document.getElementById('substitution-reports-root');
        var workbenchRoot = document.querySelector('[data-tab-panel="workbench"]');
        var tabButtons = Array.prototype.slice.call(document.querySelectorAll('.substitution-tab-button'));
        var tabPanels = Array.prototype.slice.call(document.querySelectorAll('[data-tab-panel]'));
        var activeTabId = 'daily';

        function getPanelId_(tabId) {
          var button = tabButtons.find(function (entry) {
            return entry.getAttribute('data-tab') === tabId;
          });
          return button && button.getAttribute('data-panel') ? button.getAttribute('data-panel') : tabId;
        }

        function setWorkbenchError_(message) {
          var existing = document.getElementById('substitution-workbench-error');
          if (!workbenchRoot) {
            return;
          }
          if (!message) {
            if (existing) {
              existing.remove();
            }
            return;
          }
          if (!existing) {
            existing = document.createElement('div');
            existing.id = 'substitution-workbench-error';
            existing.className = 'notice error substitution-workbench-error';
            workbenchRoot.appendChild(existing);
          }
          existing.textContent = message;
        }

        function syncReplacementWorkbench_(tabId) {
          var api = window.ROOMS_SUBSTITUTION_WORKBENCH;
          if (tabId !== 'daily' && tabId !== 'trips' && tabId !== 'long') {
            return;
          }
          setWorkbenchError_('');
          if (workbenchRoot) {
            workbenchRoot.style.display = 'block';
          }
          if (api && typeof api.activateTab === 'function') {
            api.activateTab(tabId);
            return;
          }
          document.dispatchEvent(new CustomEvent('rooms:replacement-tab-change', {
            detail: {
              tab: tabId
            }
          }));
          if (!(window.ROOMS_SUBSTITUTION_WORKBENCH && typeof window.ROOMS_SUBSTITUTION_WORKBENCH.activateTab === 'function')) {
            setWorkbenchError_('Workbench sostituzioni non disponibile.');
          }
        }

        function activateTab_(tabId) {
          activeTabId = tabId || 'daily';
          var activePanelId = getPanelId_(activeTabId);
          tabPanels.forEach(function (panel) {
            panel.classList.toggle('active', panel.getAttribute('data-tab-panel') === activePanelId);
          });
          tabButtons.forEach(function (button) {
            button.classList.toggle('active', button.getAttribute('data-tab') === activeTabId);
          });
          syncReplacementWorkbench_(activeTabId);
        }

        function setHeader_() {
          document.getElementById('substitution-subtitle').textContent = model.subtitle || '';
          document.getElementById('substitution-user-pill').textContent = model.user && model.user.email ? model.user.email : 'ROOMS';
        }

        function swapReportsContent_(htmlText) {
          var parser = new DOMParser();
          var parsed = parser.parseFromString(String(htmlText || ''), 'text/html');
          var fragment = parsed.querySelector('[data-substitution-reports-fragment]');
          if (!fragment || !reportsRoot) {
            return;
          }
          reportsRoot.innerHTML = fragment.outerHTML;
        }

        function loadReportsUrl_(url) {
          return fetch(url, {
            credentials: 'same-origin'
          }).then(function (response) {
            if (!response.ok) {
              throw new Error('Errore caricamento report.');
            }
            return response.text();
          }).then(function (html) {
            swapReportsContent_(html);
          }).catch(function (error) {
            if (!reportsRoot) {
              return;
            }
            reportsRoot.innerHTML = '<div class="notice error">' + (error && error.message ? error.message : 'Errore caricamento report.') + '</div>';
          });
        }

        tabButtons.forEach(function (button) {
          button.addEventListener('click', function () {
            activateTab_(button.getAttribute('data-tab'));
          });
        });

        if (reportsRoot) {
          reportsRoot.addEventListener('click', function (event) {
            var link = event.target && event.target.closest ? event.target.closest('a[href]') : null;
            var href;
            if (!link) {
              return;
            }
            href = link.getAttribute('href') || '';
            if (href.indexOf('?fn=substitutionReports') !== 0 && href.indexOf('?fn=substitutionReportView') !== 0) {
              return;
            }
            event.preventDefault();
            loadReportsUrl_(href);
          });
        }

        setHeader_();
        activateTab_(activeTabId);
      }());
    </script>
  </body>
</html>
